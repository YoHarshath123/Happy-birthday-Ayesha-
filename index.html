<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Mrs. Ayesha Siddiqua</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      text-align: center;
      color: #fff;
    }
    h1 {
      font-size: 3em;
      margin-top: 20vh;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.8),
                   0 0 30px #ff69b4,
                   0 0 45px #ff1493;
      animation: glow 2s ease-in-out infinite alternate;
    }
    h2 {
      font-size: 1.8em;
      margin-top: 20px;
      font-weight: 400;
      color: #fffbea;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493; }
      to { text-shadow: 0 0 20px #fff, 0 0 40px #ff69b4, 0 0 60px #ff1493; }
    }
    .balloon {
      position: absolute;
      bottom: -150px;
      width: 60px;
      height: 80px;
      background: #ff69b4;
      border-radius: 50% 50% 45% 55%;
      animation: floatUp 10s linear infinite;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      width: 2px;
      height: 20px;
      background: #fff;
      transform: translateX(-50%);
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-120vh) rotate(20deg); }
    }
  </style>
</head>
<body>
  <h1>🎉 Happy Birthday 🎂</h1>
  <h2>Dear Mrs. Ayesha Siddiqua, may your day be filled with love, joy, and happiness!</h2>

  <!-- Balloons -->
  <div class="balloon" style="left:10%; background:#ffb6c1; animation-duration:12s;"></div>
  <div class="balloon" style="left:30%; background:#87cefa; animation-duration:10s;"></div>
  <div class="balloon" style="left:50%; background:#ffd700; animation-duration:15s;"></div>
  <div class="balloon" style="left:70%; background:#98fb98; animation-duration:11s;"></div>
  <div class="balloon" style="left:90%; background:#ff69b4; animation-duration:13s;"></div>
</body>
</html>
